<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}首页{% endblock %} | 学校erp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* 常规正文 14px，大标题（h1-h6）保持 Bootstrap 默认 */
    body { font-size: 14px; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-people-fill me-1"></i>学校erp</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="切换导航">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link text-white {{ 'active' if request.url.path == '/students' else '' }}" href="{{ '/students' if is_admin else '/login' }}"><i class="bi bi-list-ul me-1"></i>学生列表</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white {{ 'active' if request.url.path == '/teachers' else '' }}" href="{{ '/teachers' if is_admin else '/login' }}"><i class="bi bi-person-badge me-1"></i>教师列表</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white {{ 'active' if request.url.path == '/schools' else '' }}" href="{{ '/schools' if is_admin else '/login' }}"><i class="bi bi-building me-1"></i>学校列表</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white {{ 'active' if request.url.path == '/grades' else '' }}" href="{{ '/grades' if is_admin else '/login' }}"><i class="bi bi-journal-check me-1"></i>学生成绩</a>
          </li>
        </ul>
        <div class="navbar-nav ms-auto">
          {% if is_admin %}
          <span class="nav-link text-white"><i class="bi bi-person-badge me-1"></i>管理员</span>
          <form action="/logout" method="post" class="d-inline">
            <button type="submit" class="btn btn-link nav-link text-white p-0 ms-2">退出</button>
          </form>
          {% else %}
          <a class="nav-link text-white {{ 'active' if request.url.path == '/login' else '' }}" href="/login"><i class="bi bi-box-arrow-in-right me-1"></i>登录</a>
          {% endif %}
          <a class="nav-link text-white" href="/docs" target="_blank"><i class="bi bi-file-code me-1"></i>API 文档</a>
        </div>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
